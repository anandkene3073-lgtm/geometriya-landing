<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometriya — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0A0F1C;
    --panel:     #121A2B;
    --panel-2:   #182238;
    --border:    #232E47;
    --text:      #E7ECF6;
    --muted:     #8896B3;
    --accent:    #3E7BFA;
    --accent-2:  #6FA0FF;
    --green:     #34D399;
    --green-bg:  rgba(52, 211, 153, 0.12);
    --amber:     #FBBF56;
    --amber-bg:  rgba(251, 191, 86, 0.12);
    --red:       #F26D6D;
    --red-bg:    rgba(242, 109, 109, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Geometric signature motif ── */
  .geo-mark {
    position: fixed;
    top: -60px;
    right: -60px;
    width: 320px;
    height: 320px;
    opacity: 0.05;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .app { position: relative; z-index: 1; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand svg { width: 22px; height: 22px; }

  .brand-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
  }

  .brand-text span { color: var(--accent-2); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .api-indicator {
    font-size: 12px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .btn:hover { border-color: var(--accent); background: var(--panel-2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-accent:hover { background: #3169db; border-color: #3169db; }

  .btn-approve { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .btn-approve:hover { background: var(--green); color: #05261a; }

  .btn-reject { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .btn-reject:hover { background: var(--red); color: #2a0a0a; }

  .btn-delete { background: transparent; border-color: var(--red); color: var(--red); opacity: 0.7; }
  .btn-delete:hover { background: var(--red); color: #2a0a0a; opacity: 1; }

  main { padding: 32px; max-width: 1100px; margin: 0 auto; }

  /* ── Login screen ── */
  .login-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px;
    width: 100%;
    max-width: 380px;
  }

  .login-card h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    margin: 0 0 6px;
  }

  .login-card p {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 28px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    margin-bottom: 18px;
  }
  input:focus { outline: none; border-color: var(--accent); }

  .login-error {
    background: var(--red-bg);
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 7px;
    margin-bottom: 16px;
    display: none;
  }

  /* ── Stats strip ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
  }

  .stat.pending .stat-value { color: var(--amber); }
  .stat.approved .stat-value { color: var(--green); }
  .stat.rejected .stat-value { color: var(--red); }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent-2); border-bottom-color: var(--accent); }

  /* ── Table ── */
  .table-wrap {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }

  td {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--panel-2); }

  .name-cell { font-weight: 600; }
  .sub-cell { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    text-transform: capitalize;
  }
  .badge-pending_approval { background: var(--amber-bg); color: var(--amber); }
  .badge-approved { background: var(--green-bg); color: var(--green); }
  .badge-rejected { background: var(--red-bg); color: var(--red); }

  .actions { display: flex; gap: 8px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 15px; color: var(--text); margin-bottom: 6px; font-weight: 600; }
  .empty-state .small { font-size: 13px; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: slideIn 0.2s ease;
    z-index: 100;
  }
  .toast.error { border-left-color: var(--red); }
  .toast.success { border-left-color: var(--green); }

  @keyframes slideIn {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .hidden { display: none !important; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: currentColor;
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .stats { grid-template-columns: 1fr; }
    main { padding: 20px 16px; }
    th:nth-child(3), td:nth-child(3) { display: none; } /* hide email col on mobile */
  }
</style>
</head>
<body>

<svg class="geo-mark" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <polygon points="100,10 190,170 10,170" stroke="#6FA0FF" stroke-width="1.5"/>
  <rect x="40" y="60" width="90" height="90" stroke="#6FA0FF" stroke-width="1.5"/>
  <polygon points="150,50 185,80 172,125 128,125 115,80" stroke="#6FA0FF" stroke-width="1.5"/>
</svg>

<div class="app">

  <!-- ── LOGIN SCREEN ── -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-card">
      <h1>Geometriya Admin</h1>
      <p>Sign in to review signups and manage trial access.</p>
      <div id="loginError" class="login-error"></div>
      <label for="apiBaseInput">Backend URL</label>
      <input id="apiBaseInput" type="text" placeholder="http://localhost:3000" />
      <label for="adminKeyInput">Admin key</label>
      <input id="adminKeyInput" type="password" placeholder="••••••••••••" />
      <button class="btn btn-accent" style="width:100%; padding:12px;" onclick="login()">Sign in</button>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dashboard" class="hidden">
    <header>
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="12,2 22,20 2,20" stroke="#6FA0FF" stroke-width="1.6"/>
        </svg>
        <div class="brand-text">Geometriya <span>Admin</span></div>
      </div>
      <div class="header-right">
        <div class="api-indicator" id="apiIndicator"></div>
        <button class="btn" onclick="loadUsers()">Refresh</button>
        <button class="btn" onclick="logout()">Sign out</button>
      </div>
    </header>

    <main>
      <div class="stats">
        <div class="stat approved">
          <div class="stat-label">Active Users</div>
          <div class="stat-value" id="statActive">—</div>
        </div>
        <div class="stat rejected">
          <div class="stat-label">Deactivated</div>
          <div class="stat-value" id="statDeactivated">—</div>
        </div>
        <div class="stat pending">
          <div class="stat-label">Total Users</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-status="active" onclick="switchTab('active')">Active</div>
        <div class="tab" data-status="deactivated" onclick="switchTab('deactivated')">Deactivated</div>
      </div>

      <div class="table-wrap">
        <table id="usersTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state hidden">
          <div class="big">Nothing here</div>
          <div class="small" id="emptyMsg"></div>
        </div>
      </div>
    </main>
  </div>

</div>

<script>
  let API_BASE = localStorage.getItem('geo_admin_api_base') || 'http://localhost:3000';
  let ADMIN_KEY = localStorage.getItem('geo_admin_key') || '';
  let currentTab = 'active';
  let allUsers = { active: [], deactivated: [] };

  document.getElementById('apiBaseInput').value = API_BASE;

  function showToast(msg, type = '') {
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  async function apiCall(path, opts = {}) {
    const res = await fetch(API_BASE + path, {
      ...opts,
      headers: { 'x-admin-key': ADMIN_KEY, 'Content-Type': 'application/json', ...(opts.headers || {}) },
    });
    if (res.status === 401) {
      logout();
      throw new Error('Session expired — please sign in again.');
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  async function login() {
    API_BASE = document.getElementById('apiBaseInput').value.trim().replace(/\/$/, '');
    ADMIN_KEY = document.getElementById('adminKeyInput').value.trim();
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    if (!API_BASE || !ADMIN_KEY) {
      errEl.textContent = 'Enter both the backend URL and your admin key.';
      errEl.style.display = 'block';
      return;
    }

    try {
      await apiCall('/api/admin/users');
      localStorage.setItem('geo_admin_api_base', API_BASE);
      localStorage.setItem('geo_admin_key', ADMIN_KEY);
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('apiIndicator').textContent = API_BASE.replace(/^https?:\/\//, '');
      loadUsers();
    } catch (e) {
      errEl.textContent = 'Could not sign in: ' + e.message;
      errEl.style.display = 'block';
    }
  }

  function logout() {
    localStorage.removeItem('geo_admin_key');
    ADMIN_KEY = '';
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
  }

  async function loadUsers() {
    try {
      const data = await apiCall('/api/admin/users');
      allUsers = { active: [], deactivated: [] };
      for (const u of data.users) {
        // is_active defaults to true for any user created before this column existed
        (u.is_active === false ? allUsers.deactivated : allUsers.active).push(u);
      }
      document.getElementById('statActive').textContent = allUsers.active.length;
      document.getElementById('statDeactivated').textContent = allUsers.deactivated.length;
      document.getElementById('statTotal').textContent = data.users.length;
      renderTable();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  function switchTab(status) {
    currentTab = status;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.status === status));
    renderTable();
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '—';
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    return Math.floor(hrs / 24) + 'd ago';
  }

  function trialInfo(u) {
    if (!u.trial_end_date) return '—';
    const daysLeft = Math.ceil((new Date(u.trial_end_date) - Date.now()) / 86400000);
    if (daysLeft < 0) return '<span style="color:var(--red)">Expired</span>';
    return daysLeft + 'd left';
  }

  function renderTable() {
    const users = allUsers[currentTab];
    const head = document.getElementById('tableHead');
    const body = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    const table = document.getElementById('usersTable');

    if (!users || users.length === 0) {
      table.classList.add('hidden');
      empty.classList.remove('hidden');
      document.getElementById('emptyMsg').textContent =
        currentTab === 'active' ? 'No active users yet.' : 'No deactivated users.';
      return;
    }
    table.classList.remove('hidden');
    empty.classList.add('hidden');

    head.innerHTML = `<tr>
      <th>User</th><th>Phone</th><th>Email</th><th>Signed up</th><th>Trial</th><th>Actions</th>
    </tr>`;

    body.innerHTML = users.map(u => `
      <tr>
        <td><div class="name-cell">${escapeHtml(u.name)}</div></td>
        <td class="mono">${formatPhone(u.phone)}</td>
        <td>${escapeHtml(u.email || '—')}</td>
        <td>${timeAgo(u.created_at)}</td>
        <td>${trialInfo(u)}</td>
        <td>
          <div class="actions">
            ${currentTab === 'active'
              ? `<button class="btn btn-reject" onclick="deactivateUser('${u.id}')">Deactivate</button>`
              : `<button class="btn btn-approve" onclick="activateUser('${u.id}')">Reactivate</button>`}
            <button class="btn btn-delete" onclick="deleteUser('${u.id}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  function formatPhone(p) {
    if (!p) return '—';
    return '+' + p.slice(0, 2) + ' ' + p.slice(2);
  }

  function escapeHtml(s) {
    if (!s) return '';
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  async function deactivateUser(id) {
    if (!confirm('Deactivate this user? Their app access and any active session will be revoked immediately.')) return;
    try {
      await apiCall(`/api/admin/deactivate/${id}`, { method: 'POST' });
      showToast('User deactivated.', '');
      loadUsers();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function activateUser(id) {
    try {
      await apiCall(`/api/admin/activate/${id}`, { method: 'POST' });
      showToast('User reactivated.', 'success');
      loadUsers();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  async function deleteUser(id) {
    const u = [...allUsers.active, ...allUsers.deactivated].find(x => x.id === id);
    const label = u ? `${u.name} (${formatPhone(u.phone)})` : 'this user';
    if (!confirm(`Permanently delete ${label}? This cannot be undone — the phone number will be free to sign up again from scratch. Deactivate instead if you just want to revoke access.`)) return;
    try {
      await apiCall(`/api/admin/users/${id}`, { method: 'DELETE' });
      showToast('User deleted.', 'success');
      loadUsers();
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  // Auto-login if we already have saved credentials
  if (ADMIN_KEY) {
    document.getElementById('adminKeyInput').value = ADMIN_KEY;
    login();
  }
</script>

</body>
</html>
